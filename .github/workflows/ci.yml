name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests (tools + copy)
        run: bunx playwright test tests/e2e/tools.spec.ts

      - name: Generator preset + copy tests
        run: bunx playwright test tests/e2e/generators.spec.ts

      - name: Accessibility tests (axe-core)
        run: bunx playwright test tests/e2e/a11y.spec.ts

      - name: SEO metadata regression
        run: bunx playwright test tests/e2e/seo.spec.ts

      - name: Blog e2e (tags, pagination, OG)
        run: bunx playwright test tests/e2e/blog.spec.ts

      - name: Footer email regression
        run: bunx playwright test tests/e2e/footer.spec.ts

      - name: PDF + clipboard regression
        run: bunx playwright test tests/e2e/pdf-and-clipboard.spec.ts tests/e2e/my-kit.spec.ts

      - name: Responsive viewport regression (375 / 768 / 1024 / 1440)
        run: bunx playwright test tests/e2e/responsive-viewports.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Lighthouse CI (performance + SEO)
        run: bunx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Summarize Lighthouse scores
        if: always()
        run: |
          if [ ! -d .lighthouseci ]; then
            echo "No Lighthouse results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## Lighthouse scores" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | Performance | Accessibility | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------------|---------------|----------------|-----|" >> "$GITHUB_STEP_SUMMARY"
          for f in .lighthouseci/lhr-*.json; do
            [ -f "$f" ] || continue
            node -e "
              const r = require('./' + process.argv[1]);
              const c = r.categories;
              const pct = (x) => x == null ? 'n/a' : Math.round(x * 100);
              console.log('| ' + r.finalUrl + ' | ' + pct(c.performance?.score) + ' | ' + pct(c.accessibility?.score) + ' | ' + pct(c['best-practices']?.score) + ' | ' + pct(c.seo?.score) + ' |');
            " "$f" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Full HTML reports are attached as the **lighthouse-html-reports** artifact on this run." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 14

      - name: Upload Lighthouse HTML reports only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-html-reports
          path: .lighthouseci/*.html
          if-no-files-found: warn
          retention-days: 30

      - name: SEO / JSON-LD sameAs regression
        run: bunx playwright test tests/e2e/social-jsonld.spec.ts